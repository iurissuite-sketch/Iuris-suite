<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Verificando...</title>
</head>
<body>
  <h2>Redirigiendo para verificar tu email...</h2>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      document.body.innerHTML = "❌ Token inválido";
    } else {
      window.location.href = "https://lfunlmhjsjrsecfhktvz.supabase.co/functions/v1/verify-email-token?token=" + token;
    }
  </script>
</body>
</html>
