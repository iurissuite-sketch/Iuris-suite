<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Verificando...</title>
</head>
<body>
  <h2 id="status">Verificando tu correo...</h2>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    const status = document.getElementById("status");

    if (!token) {
      status.innerText = "❌ Token inválido";
    } else {
      fetch("https://furlnmhjsjrsecfhktvz.supabase.co/functions/v1/verify-email-token", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          status.innerText = "✅ Email verificado correctamente";
        } else {
          status.innerText = "❌ Error verificando email";
        }
      })
      .catch(() => {
        status.innerText = "❌ Error de conexión";
      });
    }
  </script>
</body>
</html>
